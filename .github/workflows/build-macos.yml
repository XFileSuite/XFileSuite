name: Build macOS

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Source release tag, for example v1.0.0.1002"
        required: true

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: XFileSuite/XFileSuiteSource
          token: ${{ secrets.FILEPEEK_REPO_TOKEN }}
          lfs: false
          ref: ${{ github.event.inputs.tag || github.ref_name }}
      - name: Prepare deps cache dir
        run: mkdir -p .deps
      - name: Load native dependency manifest
        run: |
          ruby -rjson -e '
            manifest = JSON.parse(File.read("native_deps/manifests/macos.json"))
            components = manifest.fetch("components")
            env = {
              "NATIVE_DEPS_MANIFEST_ID" => manifest.fetch("manifestId"),
              "FFMPEG_R2_KEY" => components.fetch("ffmpeg").fetch("r2Key"),
              "FFMPEG_SHA256" => components.fetch("ffmpeg").fetch("binarySha256"),
              "IMAGEMAGICK_R2_KEY" => components.fetch("imagemagick").fetch("r2Key"),
              "IMAGEMAGICK_SHA256" => components.fetch("imagemagick").fetch("binarySha256"),
              "RESVG_R2_KEY" => components.fetch("resvg").fetch("r2Key"),
              "RESVG_SHA256" => components.fetch("resvg").fetch("binarySha256")
            }
            File.open(ENV.fetch("GITHUB_ENV"), "a") { |f| env.each { |k, v| f.puts("#{k}=#{v}") } }
          '
      - name: Restore ffmpeg from cache
        id: cache-ffmpeg-macos
        uses: actions/cache@v4
        with:
          path: .deps/ffmpeg-macos-universal
          key: native-ffmpeg-macos-${{ env.FFMPEG_SHA256 }}
      - name: Download ffmpeg from R2
        if: steps.cache-ffmpeg-macos.outputs.cache-hit != 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler r2 object get "xfilesuite-releases/${{ env.FFMPEG_R2_KEY }}" --file .deps/ffmpeg-macos-universal --remote
          test "$(shasum -a 256 .deps/ffmpeg-macos-universal | awk '{print $1}')" = "${{ env.FFMPEG_SHA256 }}"
      - name: Restore ironpress from cache
        id: cache-ironpress-macos
        uses: actions/cache@v4
        with:
          path: .deps/libironpress.dylib
          key: ironpress-macos-67c23fab5ebe6859a3f437cecfa054333d2c4802e83458b8b9fecaa3728513bf
      - name: Download ironpress from R2
        if: steps.cache-ironpress-macos.outputs.cache-hit != 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler r2 object get "xfilesuite-releases/deps/ironpress/macos/libironpress.dylib" --file .deps/libironpress.dylib --remote
          test "$(shasum -a 256 .deps/libironpress.dylib | awk '{print $1}')" = "67c23fab5ebe6859a3f437cecfa054333d2c4802e83458b8b9fecaa3728513bf"
      - name: Restore ImageMagick from cache
        id: cache-imagemagick-macos
        uses: actions/cache@v4
        with:
          path: .deps/imagemagick-macos
          key: native-imagemagick-macos-${{ env.IMAGEMAGICK_SHA256 }}
      - name: Download ImageMagick from R2
        if: steps.cache-imagemagick-macos.outputs.cache-hit != 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler r2 object get "xfilesuite-releases/${{ env.IMAGEMAGICK_R2_KEY }}" --file .deps/imagemagick-macos --remote
          test "$(shasum -a 256 .deps/imagemagick-macos | awk '{print $1}')" = "${{ env.IMAGEMAGICK_SHA256 }}"
      - name: Restore resvg from cache
        id: cache-resvg-macos
        uses: actions/cache@v4
        with:
          path: .deps/resvg-macos-universal
          key: native-resvg-macos-${{ env.RESVG_SHA256 }}
      - name: Download resvg from R2
        if: steps.cache-resvg-macos.outputs.cache-hit != 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler r2 object get "xfilesuite-releases/${{ env.RESVG_R2_KEY }}" --file .deps/resvg-macos-universal --remote
          test "$(shasum -a 256 .deps/resvg-macos-universal | awk '{print $1}')" = "${{ env.RESVG_SHA256 }}"
      - name: Verify cached native dependencies
        run: |
          test "$(shasum -a 256 .deps/ffmpeg-macos-universal | awk '{print $1}')" = "$FFMPEG_SHA256"
          test "$(shasum -a 256 .deps/imagemagick-macos | awk '{print $1}')" = "$IMAGEMAGICK_SHA256"
          test "$(shasum -a 256 .deps/resvg-macos-universal | awk '{print $1}')" = "$RESVG_SHA256"
          test "$(shasum -a 256 .deps/libironpress.dylib | awk '{print $1}')" = "67c23fab5ebe6859a3f437cecfa054333d2c4802e83458b8b9fecaa3728513bf"
      - name: Place native deps into project
        run: |
          mkdir -p macos/Runner/Resources
          cp .deps/ffmpeg-macos-universal macos/Runner/Resources/ffmpeg
          chmod +x macos/Runner/Resources/ffmpeg
          cp .deps/imagemagick-macos macos/Runner/Resources/magick
          chmod +x macos/Runner/Resources/magick
          cp .deps/resvg-macos-universal macos/Runner/Resources/resvg
          chmod +x macos/Runner/Resources/resvg
          mkdir -p packages/ironpress_local/macos/libs
          mkdir -p packages/ironpress_local/macos/ironpress/Ironpress.xcframework/macos-arm64_x86_64
          cp .deps/libironpress.dylib packages/ironpress_local/macos/libs/libironpress.dylib
          cp .deps/libironpress.dylib packages/ironpress_local/macos/ironpress/Ironpress.xcframework/macos-arm64_x86_64/libironpress.dylib
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.2"
          channel: stable
      - run: flutter pub get
      - run: pod install
        working-directory: macos
      - name: Disable sandbox for non-App Store build
        run: |
          /usr/libexec/PlistBuddy -c "Set :com.apple.security.app-sandbox false" macos/Runner/DebugProfile.entitlements
          /usr/libexec/PlistBuddy -c "Set :com.apple.security.app-sandbox false" macos/Runner/Release.entitlements
      - name: Override code signing for CI (ad-hoc)
        run: |
          PBXPROJ="macos/Runner.xcodeproj/project.pbxproj"
          # Replace Apple Development / Automatic signing with ad-hoc / Manual for Release & Profile targets
          sed -i '' 's/CODE_SIGN_IDENTITY = "Apple Development"/CODE_SIGN_IDENTITY = "-"/g' "$PBXPROJ"
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' "$PBXPROJ"
          sed -i '' '/DEVELOPMENT_TEAM = JJ8T5Y738R/d' "$PBXPROJ"
      - run: flutter build macos --release --obfuscate --split-debug-info=symbols --dart-define=IS_SANDBOX=false
      - name: Verify bundled third-party license notices
        run: |
          LICENSE_DIR="build/macos/Build/Products/Release/FilePeek.app/Contents/Resources/ThirdPartyLicenses"
          test -d "$LICENSE_DIR"
          for file in NOTICE.md LICENSE-FFmpeg-LGPL-2.1.txt LICENSE-LAME-LGPL-2.0.txt LICENSE-libogg.txt LICENSE-libvorbis.txt LICENSE-libvpx.txt LICENSE-mpv-LGPL-2.1.txt LICENSE-ImageMagick.txt LICENSE-MozJPEG.txt LICENSE-libpng.txt LICENSE-libwebp.txt LICENSE-libtiff.txt LICENSE-giflib.txt LICENSE-resvg.txt LICENSE-ironpress.txt LICENSE-PDFium.txt; do
            test -s "$LICENSE_DIR/$file"
          done
      - name: Rename app bundle
        run: |
          cd build/macos/Build/Products/Release
          if [ -d "FilePeek.app" ] && [ ! -d "XFileSuite.app" ]; then
            mv FilePeek.app XFileSuite.app
          fi
      - name: Ad-hoc sign app bundle
        run: |
          APP_PATH="build/macos/Build/Products/Release/XFileSuite.app"
          xattr -cr "$APP_PATH" || true
          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
      - run: brew install create-dmg
      - name: Create DMG
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          DMG_DIR="dist/macos-dmg"
          rm -rf "$DMG_DIR"
          mkdir -p "$DMG_DIR"
          cp -R "build/macos/Build/Products/Release/XFileSuite.app" "$DMG_DIR/"
          cat > "$DMG_DIR/打开说明.txt" <<'EOF'
          XFileSuite 打开说明

          如果 macOS 提示“无法验证开发者”，请使用下面任意一种方式打开：

          方式一：推荐
          右键或 Control + 点按 XFileSuite.app，选择“打开”，再点击“仍要打开”。
          这会对当前 App 永久生效，下次可以直接双击打开。

          方式二：高级用户
          如果已经把 App 拖到“应用程序”，可在终端执行：

          xattr -r -d com.apple.quarantine /Applications/XFileSuite.app

          然后重新打开 XFileSuite。
          EOF
          create-dmg --volname "XFileSuite" --window-pos 200 120 --window-size 720 400 --icon-size 100 --icon "XFileSuite.app" 160 170 --hide-extension "XFileSuite.app" --icon "打开说明.txt" 360 170 --app-drop-link 560 170 "XFileSuite-${TAG}.dmg" "$DMG_DIR"
      - name: Create ZIP for auto-update
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          cd build/macos/Build/Products/Release
          ditto -c -k --keepParent XFileSuite.app "$GITHUB_WORKSPACE/XFileSuite-${TAG}-macos.zip"
          test -f "$GITHUB_WORKSPACE/XFileSuite-${TAG}-macos.zip"
      - name: Upload DMG to Cloudflare R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID secrets are required"
            exit 1
          fi
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          FILE="XFileSuite-${TAG}.dmg"
          npx wrangler r2 object put "xfilesuite-releases/staging/${TAG}/XFileSuite-${TAG}.dmg" --file "$FILE" --content-type "application/x-apple-diskimage" --remote
      - name: Upload ZIP to Cloudflare R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          FILE="XFileSuite-${TAG}-macos.zip"
          npx wrangler r2 object put "xfilesuite-releases/staging/${TAG}/XFileSuite-${TAG}-macos.zip" --file "$FILE" --content-type "application/zip" --remote
      - name: Mark macOS assets ready in R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          printf '%s\n' "$TAG" > "$RUNNER_TEMP/macos-ready"
          npx wrangler r2 object put "xfilesuite-releases/staging/${TAG}/macos-ready" --file "$RUNNER_TEMP/macos-ready" --content-type "text/plain" --remote
      - name: Start the serial Cloudflare sync workflow
        env:
          GH_TOKEN: ${{ secrets.XFILESUITECLOUD_DISPATCH_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::XFILESUITECLOUD_DISPATCH_TOKEN secret is required"
            exit 1
          fi
          gh workflow run sync-cloudflare.yml --repo XFileSuite/XFileSuite --ref main -f tag="$TAG"
